; LilyGo T-2CAN (ESP32-S3) — ODrive CAN 제어
; 보드: ESP32-S3-WROOM-1U (16MB flash, 8MB PSRAM), 듀얼 CAN FD (MCP2518FD)
;
; 주의:
;  - board 는 범용 esp32-s3-devkitc-1 사용 (T-2CAN 전용 정의 없음). flash 16MB 반영.
;  - PSRAM 모드(opi/qio)는 CAN 만 쓸 땐 불필요 — 필요 시 활성화 후 검증.
;  - 보드 변형 = T-2Can V1.0 (MCP2515, Classic CAN 2.0). FD 변형 아님.
;  - ODrive can_simple = Classic CAN 2.0 → MCP2515 네이티브로 딱 맞음.
;  - CAN 드라이버 = autowp/arduino-mcp2515 (LilyGo 예제가 쓰는 것, ESP32-S3 호환 확인).
;    ※ sandeepmistry/arduino-CAN 은 ESP32-S3 미지원(ESP32SJA1000.cpp 가 구형 레지스터
;      DPORT_CAN_RST 등 참조 → 빌드 실패) 이라 폐기.
;  - can_simple 메시지(heartbeat/encoder)는 main.cpp 에서 직접 디코드(little-endian).

; === 제어 펌웨어 (메인) ===
[env:lilygo-t-2can]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_size = 16MB

; imu_test.cpp / enc_test.cpp 는 이 환경에서 제외 (setup/loop 충돌 방지)
build_src_filter = +<*> -<imu_test.cpp> -<enc_test.cpp>

lib_deps =
    https://github.com/autowp/arduino-mcp2515.git
    adafruit/Adafruit BNO08x       ; IMU 센싱(메인 통합) — 모터와 공존

; 빌드 플래그 (필요 시)
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1   ; USB CDC 시리얼 모니터

; === IMU 진단 모드 (BNO085 데이터만 읽어 시리얼 출력) ===
; 빌드/플래시:  platformio run -d esp32t2can -e imu-test -t upload --upload-port COM5
; QWIIC = SDA=GPIO1, SCL=GPIO2 (LilyGo T-2CAN 공식 핀맵 확인됨)
[env:imu-test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_size = 16MB

; 이 환경은 imu_test.cpp 만 컴파일 (main.cpp 제외)
build_src_filter = -<*> +<imu_test.cpp>

lib_deps =
    adafruit/Adafruit BNO08x

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1

; === 인코더 idle-read 진단 (arm 없이 0x0A 로 idle 위치 읽히는지 확인) ===
; 빌드/플래시:  platformio run -d esp32t2can -e enc-test -t upload --upload-port COM5
; ODrive 를 CAN-A 버스에 연결 + 24V 전원 ON + IDLE 상태로 두고 손으로 돌려본다.
[env:enc-test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_size = 16MB

; 이 환경은 enc_test.cpp 만 컴파일 (main.cpp / imu_test.cpp 제외)
build_src_filter = -<*> +<enc_test.cpp>

lib_deps =
    https://github.com/autowp/arduino-mcp2515.git

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
